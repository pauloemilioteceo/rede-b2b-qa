name: Mover issue para Falhou ao criar sub-issue

on:
  issues:
    types: [opened]

permissions:
  issues: read

jobs:
  move-to-falhou:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar se issue tem parent e mover para Falhou
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_ID: "PVT_kwHOEBTB_s4BSpi8"
          STATUS_FIELD_ID: "PVTSSF_lAHOEBTB_s4BSpi8zhAHwdo"
          FALHOU_OPTION_ID: "22c05773"
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          OWNER=${{ github.repository_owner }}
          REPO=${{ github.event.repository.name }}

          # Verifica se a issue recém criada tem um parent issue
          PARENT_NUMBER=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                issue(number: $number) {
                  parent {
                    number
                  }
                }
              }
            }
          ' -f owner="$OWNER" \
            -f repo="$REPO" \
            -F number=$ISSUE_NUMBER \
            --jq '.data.repository.issue.parent.number // empty')

          if [ -z "$PARENT_NUMBER" ]; then
            echo "Issue #$ISSUE_NUMBER não tem parent. Nenhuma ação realizada."
            exit 0
          fi

          echo "Issue #$ISSUE_NUMBER é sub-issue de #$PARENT_NUMBER. Buscando no projeto..."

          # Busca o item do projeto correspondente ao parent issue
          ITEM_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                issue(number: $number) {
                  projectItems(first: 10) {
                    nodes {
                      id
                      project { id }
                    }
                  }
                }
              }
            }
          ' -f owner="$OWNER" \
            -f repo="$REPO" \
            -F number=$PARENT_NUMBER \
            --jq ".data.repository.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id")

          if [ -z "$ITEM_ID" ]; then
            echo "Issue #$PARENT_NUMBER não está no projeto. Nenhuma ação realizada."
            exit 0
          fi

          # Atualiza o status do parent para Falhou
          gh api graphql -f query="
            mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: \"$PROJECT_ID\"
                itemId: \"$ITEM_ID\"
                fieldId: \"$STATUS_FIELD_ID\"
                value: { singleSelectOptionId: \"$FALHOU_OPTION_ID\" }
              }) {
                projectV2Item { id }
              }
            }
          "

          echo "Issue #$PARENT_NUMBER movida para Falhou no projeto."
